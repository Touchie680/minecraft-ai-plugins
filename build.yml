name: Build Minecraft Plugin
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # Dynamically finds and builds the plugin inside any generated project folder
      - name: Build with Maven
        run: |
          POM_PATH=$(find . -name "pom.xml" -print -quit)
          if [ -z "$POM_PATH" ]; then
            echo "Error: No pom.xml project configuration file found in the repository!"
            exit 1
          fi
          cd $(dirname "$POM_PATH")
          mvn clean package

      - name: Upload Finished Jar
        uses: actions/upload-artifact@v4
        with:
          name: compiled-minecraft-plugin
          path: "**/target/*.jar"
